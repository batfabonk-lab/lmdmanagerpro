{% extends 'base.html' %}
{% load static %}

{% block title %}Connexion - Système LMD{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{% static 'core/img/lmdlogo.png' %}" alt="LMDManagerPro" style="height: 80px; width: 80px; object-fit: contain; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
                        <h3 class="mt-3 fw-bold">Connexion</h3>
                        <p class="text-muted mb-0">LMDManagerPro</p>
                        {% if institution_name %}
                        <p class="fw-semibold text-primary mt-1" style="font-size: 1.05rem;">{{ institution_name }}</p>
                        {% endif %}
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person me-1"></i>
                                Nom d'utilisateur
                            </label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock me-1"></i>
                                Mot de passe
                            </label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Se connecter
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'home' %}" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>
                            Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
