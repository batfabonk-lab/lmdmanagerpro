{% extends 'reglage/base_list.html' %}
{% block title %}Modifier {{ titre }}{% endblock %}

{% block reglage_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Modifier {{ titre }}</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }} {% if field.field.required %}*{% endif %}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url retour %}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Retour</a>
                        <button type="submit" class="btn btn-warning"><i class="bi bi-save me-2"></i>Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock reglage_content %}
