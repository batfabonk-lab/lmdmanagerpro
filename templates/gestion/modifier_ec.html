{% extends 'base.html' %}
{% block title %}Modifier EC{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Modifier l'EC : {{ ec.intitule_ue }}</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Code EC *</label>
                                {{ form.code_ec }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Intitulé *</label>
                                {{ form.intitule_ue }}
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">UE *</label>
                                {{ form.code_ue }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Crédits *</label>
                                {{ form.credit }}
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Seuil</label>
                                {{ form.seuil }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Catégorie</label>
                                {{ form.categorie }}
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Classe</label>
                            {{ form.classe }}
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'gestion_ec' %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Retour
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save me-2"></i>Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
