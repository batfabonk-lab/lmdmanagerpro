{% extends 'base.html' %}

{% block title %}{{ titre }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        {{ titre }}
                    </h5>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="bi bi-trash display-1 text-danger"></i>
                    </div>
                    <h4>{{ message }}</h4>
                    <div class="alert alert-warning mt-4">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <strong>Attention !</strong> Cette action est irréversible et supprimera toutes les données associées.
                    </div>
                </div>
                <div class="card-footer text-center">
                    <form method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i>Oui, tout supprimer
                        </button>
                    </form>
                    <a href="{% url retour %}" class="btn btn-secondary">
                        <i class="bi bi-x me-2"></i>Annuler
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
